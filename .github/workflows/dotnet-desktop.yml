name: 发布单文件

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      Project_Path: ComfyUIDownloader/ComfyUIDownloader.csproj
      Output_Directory: publish

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装 .NET SDK
      uses: actions/setup-dotnet@v4
    - name: 发布单文件
      run: |
        dotnet publish ${{ env.Project_Path }} `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -o ${{ env.Output_Directory }}

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ComfyUIDownloader
        path: ${{ env.Output_Directory }}/*.exe
